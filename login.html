<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login 🍓 PyGame Gaming</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <!-- Background seeds -->
  <div class="stars" id="stars"></div>
  <div id="pixels"></div>

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="logo">🍓 <span>PyGame</span> Gaming</a>
    <div class="nav-badge">🎮 v1.0 — BETA</div>
  </nav>

  <!-- Login Card -->
  <div class="page-wrap">

    <div class="card">

      <!-- Character + bubble -->
      <div class="char-row">
        <div class="char-frame">
          <!--
            Replace with your image:
            <img src="assets/character.png" alt="Character" />
          -->
          <div class="char-emoji">🍓</div>
        </div>
        <div class="bubble">
          <p>Welcome back,<br><strong>coder!</strong> 🍓<br>Miss me? <span class="blink">▌</span></p>
        </div>
      </div>

      <!-- Title -->
      <div class="card-title">
        <span class="pixel-label">🔐 PLAYER LOGIN</span>
        <h1>Welcome Back!</h1>
        <p class="subtitle">Continue your Python adventure 🚀</p>
      </div>

      <!-- Form -->
      <div class="form">

        <div class="input-group">
          <label for="email">📧 Email</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="yourname@email.com" />
          </div>
        </div>

        <div class="input-group">
          <label for="password">🔒 Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••" />
            <button class="toggle-pw" id="togglePw" type="button">👁️</button>
          </div>
        </div>

        <div class="form-row">
          <label class="remember">
            <input type="checkbox" id="remember" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button class="btn btn-primary" id="loginBtn" type="button">
          ▶ LOGIN
        </button>

        <div class="divider"><span>or</span></div>

        <p class="switch-text">
          Don't have an account?
          <a href="register.html">✦ Register here!</a>
        </p>

      </div>
    </div>

    <!-- Decorative strawberries -->
    <div class="deco deco-left">🍓</div>
    <div class="deco deco-right">🍓</div>

  </div>

  <!-- Footer -->
  <footer>
    Made with 🍓 by <span>Nur Myra Qistina</span> · Python Learning Through Gaming · UPTM 2026
  </footer>

  <script src="js/login.js"></script>
</body>
</html>
